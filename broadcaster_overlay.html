<!DOCTYPE html>
<html lang="en">
<!-- tnp - 09/2025 - only appears if a task is in !focus / disappears when task is !done -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcaster Focus Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: transparent;
        }

        .focus-overlay {
            width: 400px;
            height: 40px;
            background: rgba(45, 45, 45, 0.6);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            padding: 0 16px;
            position: relative;
            overflow: hidden;
        }

        .focus-overlay.visible {
            display: flex;
        }

        .focus-header {
            color: #ffffff;
            font-size: 14px;
            margin-right: 8px;
            white-space: nowrap;
            font-weight: bold;
        }

        .focus-task {
            color: #889cce;
            font-size: 16px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .focus-pulse {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.1) 50%,
                    transparent 100%);
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .focus-overlay.fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        .focus-overlay.fade-out {
            animation: fadeOut 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="focus-overlay" id="broadcasterFocusOverlay">
        <div class="focus-pulse"></div>
        <span class="focus-header">What's <span id="streamerName">CHANGE IN _settings.js</span> working on?</span>
        <span class="focus-task" id="focusedTask">Working on something awesome...</span>
    </div>

    <script>
        class BroadcasterFocusOverlay {
            constructor() {
                this.overlay = document.getElementById('broadcasterFocusOverlay');
                this.streamerNameEl = document.getElementById('streamerName');
                this.focusedTaskEl = document.getElementById('focusedTask');
                this.currentFocusId = null;
                this.streamerName = 'Streamer';
                this.lastCommandTimestamp = 0;
            }

            setStreamerName(name) {
                this.streamerName = name;
                this.streamerNameEl.textContent = name;
            }

            updateFocusedTask(taskDescription, taskId) {
                console.log('Updating focused task:', taskDescription, taskId);

                // Only update if this is the currently focused task
                if (taskId === this.currentFocusId) {
                    this.focusedTaskEl.textContent = taskDescription;
                    console.log('Updated overlay with new task description:', taskDescription);
                }
            }

            showFocusedTask(taskDescription, taskId, streamerName = null) {
                console.log('Showing focused task:', taskDescription, taskId, streamerName);

                if (streamerName) {
                    this.setStreamerName(streamerName);
                }

                this.currentFocusId = taskId;
                this.focusedTaskEl.textContent = taskDescription;

                this.overlay.classList.remove('fade-in', 'fade-out');
                this.overlay.classList.add('visible', 'fade-in');

                setTimeout(() => {
                    this.overlay.classList.remove('fade-in');
                }, 500);
            }

            hideFocusedTask(taskId = null) {
                console.log('Hiding focused task:', taskId);

                if (taskId === null || taskId === this.currentFocusId) {
                    this.overlay.classList.add('fade-out');

                    setTimeout(() => {
                        this.overlay.classList.remove('visible', 'fade-out');
                        this.currentFocusId = null;
                    }, 500);
                }
            }

            startListening() {
                // Listen for localStorage changes from the main task bot
                window.addEventListener('storage', (e) => {
                    if (e.key === 'broadcasterFocusCommand') {
                        try {
                            const command = JSON.parse(e.newValue);

                            // Prevent processing the same command twice
                            if (command.timestamp <= this.lastCommandTimestamp) {
                                return;
                            }
                            this.lastCommandTimestamp = command.timestamp;

                            console.log('Received command:', command);

                            if (command.action === 'show') {
                                this.showFocusedTask(
                                    command.taskDescription,
                                    command.taskId,
                                    command.streamerName
                                );
                            } else if (command.action === 'hide') {
                                this.hideFocusedTask(command.taskId);
                            } else if (command.action === 'update') {
                                // NEW: Handle update action
                                this.updateFocusedTask(command.taskDescription, command.taskId);
                            }
                        } catch (error) {
                            console.error('Error parsing focus command:', error);
                        }
                    }

                });

                // Also check for existing commands on load
                this.checkForExistingCommand();

                // Periodically check for commands (backup in case storage event doesn't fire)
                setInterval(() => {
                    this.checkForExistingCommand();
                }, 1000);
            }

            checkForExistingCommand() {
                try {
                    const commandData = localStorage.getItem('broadcasterFocusCommand');
                    if (commandData) {
                        const command = JSON.parse(commandData);

                        // Only process if it's newer than our last processed command
                        if (command.timestamp > this.lastCommandTimestamp) {
                            this.lastCommandTimestamp = command.timestamp;

                            if (command.action === 'show') {
                                this.showFocusedTask(
                                    command.taskDescription,
                                    command.taskId,
                                    command.streamerName
                                );
                            } else if (command.action === 'hide') {
                                this.hideFocusedTask(command.taskId);
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error checking existing command:', error);
                }
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function () {
            window.broadcasterFocusOverlay = new BroadcasterFocusOverlay();
            window.broadcasterFocusOverlay.startListening();
            console.log('Broadcaster Focus Overlay initialized and listening');
        });
    </script>
</body>

</html>
