<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cowork widget</title>

<!--
  ═══════════════════════════════════════════════════════
  i broke it into sections so you can find the things. the obs size is 800x1200
  ═══════════════════════════════════════════════════════
-->

<!-- fonts — nunito for body text, georgia is built-in for the header
     if u want different fonts just swap the family name in the url
     and update font-family below. google fonts has a ton of free ones -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

/* ═══════════════════════════════════════════════════════
    brand colors 
    ═══════════════════════════════════════════════════════ */

:root {
  --accent:  #9db4cc;     /* usernames, left borders, command text, spotlight border */
  --accent2: #b8ccb0;     /* done states, connection dot, count badge */
  --gold:    #c9a96e;     /* session pill, pronouns pill */
  --bg:      rgba(22,22,24,0.94);   /* main panel background  opacity controlled below */
  --surface: #1e1e21;     /* popup card background */
  --text:    #e4e2de;     /* all regular body text */
  --muted:   rgba(228,226,222,0.42); /* dimmer text — hints, counts, labels */
  --line:    rgba(255,255,255,0.09); /* divider lines, borders */
}

/* ═══════════════════════════════════════════════════════
   layout
   ═══════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 800px;
  height: 1200px;
  background: transparent;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.panel {
  width: 800px;
  height: 1200px;
  background: var(--bg);
  border: 1.5px solid var(--line);
  border-radius: 44px;   
  padding: 40px 46px 36px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
}

/* ═══════════════════════════════════════════════════════
   the gradient stripe at the top  
   to change colors: edit the hex values in the gradient below.
   to change thickness: edit the height value (currently 5px).
   to remove it entirely: just delete this whole block.
   you can add more if you want :
   linear-gradient(90deg, #color1, #color2, #color3, #color4)
   ═══════════════════════════════════════════════════════ */

.panel::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;                    /* ← thickness of the bar */
  border-radius: 44px 44px 0 0;
  background: linear-gradient(90deg,
    var(--accent),                /* ← left color */
    var(--gold),                  /* ← middle color */
    var(--accent2)                /* ← right color */
  );
}

/* ═══════════════════════════════════════════════════════
   header
   the row with the icon, title, clock, and session count.
   ═══════════════════════════════════════════════════════ */

.header {
  display: flex;
  align-items: center;
  gap: 18px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 26px;
  flex-shrink: 0;
}
.header-icon  { font-size: 34px; line-height: 1; }
.header-title {
  font-family: Fredoka, 'Times New Roman', serif;
  /*font-style: italic; */
  font-size: 44px;     /* ← title text size */
  font-weight: normal;
  color: var(--text);
  line-height: 1;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.clock {
  font-size: 34px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.session-pill {
  font-size: 21px;
  font-weight: 800;
  color: var(--gold);
  background: rgba(201,169,110,0.12);
  border: 1.5px solid rgba(201,169,110,0.28);
  border-radius: 999px;
  padding: 5px 18px;
  white-space: nowrap;
}

/* connection dot — blinks yellow while connecting, goes green when live */
.dot {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
  transition: background .3s;
}
.dot.connecting { background: rgba(228,226,222,0.35); animation: pulse 1.1s ease-in-out infinite; }
.dot.connected  { background: var(--accent2); animation: pulse 3s ease-in-out infinite; }
.dot.error      { background: #c47a7a; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .25; transform: scale(.65); }
}

/* ═══════════════════════════════════════════════════════
  command strip

   to add a command to the display:
   copy one of the hint-item blocks in the HTML and edit the text.
 
   to remove one: just delete that hint-item block.
   to hide the whole strip: add  display:none;  to .hints below.
   ═══════════════════════════════════════════════════════ */

.hints {
  display: flex;
  flex-shrink: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 16px 0;
  margin-bottom: 26px;
}
.hint-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 0 6px;
  text-align: center;
}
.hint-item + .hint-item { border-left: 1px solid var(--line); }
.hint-cmd {
  display: block;
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);      /* ← command text color, pulls from --accent */
  letter-spacing: 0.02em;
  line-height: 1;
}
.hint-desc {
  display: block;
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 17px;
  color: var(--muted);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════
   task list- don't touch the flex/overflow 
   ═══════════════════════════════════════════════════════ */

.section-label {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 19px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
  flex-shrink: 0;
}
.count-badge {
  font-size: 19px;
  font-weight: 700;
  color: var(--accent2);
  background: rgba(184,204,176,0.15);
  border-radius: 999px;
  padding: 1px 12px;
}

.scroll-wrap  { flex: 1; overflow: hidden; min-height: 0; position: relative; }
.scroll-inner { height: 100%; overflow-y: auto; overflow-x: hidden; padding-right: 6px; }
.scroll-inner::-webkit-scrollbar { width: 3px; }
.scroll-inner::-webkit-scrollbar-track { background: transparent; }
.scroll-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

#task-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 20px;          /* ← space between different users' task groups */
  padding: 2px 0 10px;
}

.user-group {
  border-left: 3px solid var(--accent);   /* ← the colored left bar per user */
  padding-left: 20px;
  animation: slideIn .32s cubic-bezier(.34,1.4,.64,1) both;
  transition: border-color .5s;
}
.user-group.all-done { border-left-color: var(--accent2); }   /* goes to green when all done */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: none; }
}

.group-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.uname {
  font-size: 27px;
  font-weight: 800;
  color: var(--accent);
  text-transform: lowercase;
  line-height: 1;
}
.user-badges { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.ubadge { font-size: 17px; opacity: .8; }

/* pronouns pill next to username — only shows if the user has set pronouns on twitch */
.pronouns-tag {
  font-size: 17px;
  font-weight: 600;
  color: var(--gold);
  opacity: .8;
  background: rgba(201,169,110,0.1);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 999px;
  padding: 1px 9px;
  flex-shrink: 0;
}
.group-count {
  font-size: 19px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  opacity: .6;
}

.task-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 3px 0;
  overflow: hidden;
  transition: opacity .4s, transform .4s, max-height .4s, padding .4s;
}
.task-item.new-item { animation: taskPop .26s cubic-bezier(.34,1.4,.64,1) both; }
@keyframes taskPop {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: none; }
}
.task-item.leaving   { opacity: 0; transform: translateX(14px); max-height: 0; padding: 0; }
.task-item.done-item { opacity: .35; }
.task-item.done-item .task-text { text-decoration: line-through; }

.task-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  flex-shrink: 0;
  min-width: 38px;
}
.done-check { font-size: 19px; color: var(--accent2); font-weight: 700; flex-shrink: 0; }
.task-text  { font-size: 29px; font-weight: 600; color: var(--text); line-height: 1.38; word-break: break-word; }

.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
  font-size: 24px;
  font-style: italic;
  font-family: Georgia, serif;
}
.empty-state .e-icon { display: block; font-size: 42px; margin-bottom: 14px; opacity: .25; }

/* ═══════════════════════════════════════════════════════
  whose in the session section
   ═══════════════════════════════════════════════════════ */

.shelf {
  flex-shrink: 0;
  padding-top: 18px;
  margin-top: 20px;
  border-top: 1px solid var(--line);
}
.shelf-label {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.shelf-tags { display: flex; flex-wrap: wrap; gap: 9px; }
.stag {
  font-size: 21px;
  font-weight: 700;
  color: var(--text);
  background: rgba(157,180,204,0.1);
  border: 1.5px solid rgba(157,180,204,0.2);
  border-radius: 999px;
  padding: 5px 18px;
  display: flex;
  align-items: center;
  gap: 7px;
  animation: tagIn .3s cubic-bezier(.34,1.8,.64,1) both;
}
@keyframes tagIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.stag .done-ct { font-size: 18px; color: var(--accent2); font-weight: 700; }

/* ═══════════════════════════════════════════════════════
   pop up (!currenttask / !mytasks)
   ═══════════════════════════════════════════════════════ */

#ct-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  z-index: 1002;
}
.ct-card {
  background: var(--surface);
  border: 2px solid rgba(157,180,204,0.3);
  border-radius: 36px;
  padding: 52px 68px;
  max-width: 88%;
  max-height: 82vh;
  overflow-y: auto;
  text-align: center;
  animation: ctIn .38s cubic-bezier(.34,1.3,.64,1) both;
}
.ct-card::before {
  content: ""; display: block;
  height: 3px; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  margin-bottom: 30px;
}
.ct-card.leaving { animation: ctOut .4s ease forwards; }
@keyframes ctIn  { from { opacity: 0; transform: scale(.86) translateY(18px); } to { opacity: 1; transform: none; } }
@keyframes ctOut { to   { opacity: 0; transform: scale(.9) translateY(-12px); } }
.ct-card::-webkit-scrollbar { width: 3px; }
.ct-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
.ct-who   { font-size: 21px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); opacity: .75; margin-bottom: 14px; }
.ct-label { font-size: 18px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.ct-task  { font-family: Georgia, serif; font-size: 52px; font-style: italic; color: var(--text); line-height: 1.3; word-break: break-word; }
.ct-icon  { font-size: 34px; margin-top: 20px; opacity: .55; }
.ct-tasks { list-style: none; text-align: left; margin-top: 8px; }
.ct-tasks li { font-family: Georgia, serif; font-style: italic; font-size: 40px; color: var(--text); padding: 5px 0; display: flex; gap: 14px; align-items: baseline; }
.ct-tasks .ct-n { font-family: 'Courier New', monospace; font-style: normal; font-size: 26px; color: var(--muted); flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════
  interact in obs - don't remove the IDs
   ═══════════════════════════════════════════════════════ */

#settings-dot {
  position: absolute;
  top: 18px; left: 22px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  z-index: 500;
  transition: background .2s, transform .2s;
}
#settings-dot:hover  { background: rgba(157,180,204,0.6); transform: scale(1.5); }
#settings-dot.active { background: var(--accent); }

/* dark backdrop when settings is open */
#settings-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 900;
  display: none;
}
#settings-backdrop.open { display: block; }

/* the actual settings panel */
#settings-panel {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 660px;
  background: #18181c;
  border: 2px solid rgba(157,180,204,0.25);
  border-radius: 36px;
  padding: 44px 48px;
  display: none;
  flex-direction: column;
  gap: 32px;
  font-family: 'Nunito', sans-serif;
  z-index: 901;
}
#settings-panel.open { display: flex; }

.sp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sp-title {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 32px;
  color: var(--accent);
}
.sp-close {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  color: var(--muted);
  font-size: 22px;
  cursor: pointer;
  transition: all .15s;
}
.sp-close:hover { background: rgba(157,180,204,0.15); color: var(--accent); }

.sp-section {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.sp-label {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.sp-row { display: flex; align-items: center; gap: 14px; }

/* color picker */
input[type=color] {
  width: 64px; height: 52px;
  border: 2px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  background: none;
  cursor: pointer;
  padding: 3px;
  flex-shrink: 0;
}
/* hex text field */
#hex-display {
  font-family: 'Courier New', monospace;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 10px 16px;
  width: 160px;
  outline: none;
  letter-spacing: 0.05em;
  transition: border-color .15s;
}
#hex-display:focus { border-color: rgba(157,180,204,0.5); }

/* opacity slider */
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 7px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.sp-val {
  font-family: 'Courier New', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 8px 14px;
  min-width: 82px;
  text-align: center;
}

/* preset color swatches */
.sp-swatches { display: flex; flex-wrap: wrap; gap: 11px; }
.swatch {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.12);
  cursor: pointer;
  transition: transform .15s, border-color .15s;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.28); border-color: rgba(255,255,255,0.6); }

/* ═══════════════════════════════════════════════════════
  confetti when done
   ═══════════════════════════════════════════════════════ */

#cel { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.cp { position: absolute; animation: confettiFall var(--d, 1.4s) ease-out forwards; }
@keyframes confettiFall {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--r)) scale(.1); opacity: 0; }
}
.bl { position: absolute; animation: bloomPop 1.1s ease-out forwards; }
@keyframes bloomPop {
  0%   { transform: scale(0) rotate(-18deg); opacity: 1; }
  50%  { transform: scale(1.5) rotate(8deg); opacity: 1; }
  100% { transform: scale(.5) rotate(5deg) translateY(-36px); opacity: 0; }
}
.toast {
  position: fixed; left: 50%; top: 35%;
  transform: translateX(-50%);
  background: var(--surface);
  color: var(--text);
  border: 2px solid rgba(157,180,204,0.45);
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 36px;
  padding: 18px 48px;
  border-radius: 999px;
  white-space: nowrap;
  animation: toastAnim 2.2s ease forwards;
  z-index: 1001;
}
@keyframes toastAnim {
  0%   { opacity: 0; transform: translateX(-50%) translateY(12px) scale(.88); }
  14%  { opacity: 1; transform: translateX(-50%) scale(1); }
  70%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-14px) scale(.9); }
}

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
  HTML 
   ═══════════════════════════════════════════════════════ -->

<div class="panel">

  <!-- settings dot — tiny, top-left, click in OBS Interact to open settings -->
  <div id="settings-dot" onclick="openSettings()"></div>

  <!-- ─── HEADER ─────────────────────────────────────────────
    clock and session count update automatically.. dont change it
  ──────────────────────────────────────────────────────── -->
  <div class="header">
    <span class="header-icon">✨</span>            <!-- ← EDIT THIS: icon emoji -->
    <span class="header-title" id="widget-title">bare minimum</span>  <!-- ← EDIT THIS: or change it in settings -->
    <div class="header-right">
      <span class="clock" id="clock">--:--</span>
      <span class="session-pill" id="session-pill">0 done</span>
      <span class="dot connecting" id="dot"></span>
    </div>
  </div>

  <!-- ─── COMMAND HINTS STRIP ────────────────────────────────
      to RENAME a command:
      change the hint-cmd text here AND the CMD_ variable in JS.
    ──────────────────────────────────────────────────────── -->
  <div class="hints">

    <div class="hint-item">
      <span class="hint-cmd">!task</span>           <!-- ← command text shown on screen -->
      <span class="hint-desc">add a task</span>     <!-- ← description shown below it -->
    </div>

    <div class="hint-item">
      <span class="hint-cmd">!done</span>
      <span class="hint-desc">mark complete</span>
    </div>

    <div class="hint-item">
      <span class="hint-cmd">!doneall</span>
      <span class="hint-desc">finish all</span>
    </div>

    <div class="hint-item">
      <span class="hint-cmd">!remove</span>
      <span class="hint-desc">delete a task</span>
    </div>

    <div class="hint-item">
      <span class="hint-cmd">!currenttask</span>
      <span class="hint-desc">spotlight it</span>
    </div>

    <!-- ← COPY THIS BLOCK TO ADD ANOTHER COMMAND TO THE DISPLAY:
    <div class="hint-item">
      <span class="hint-cmd">!yourcommand</span>
      <span class="hint-desc">description</span>
    </div>
    -->

  </div>

  <!-- ─── FOCUS BOARD ─────────────────────────────────────────
    the emoji and label here are editable
    the count badge updates automatically
  ──────────────────────────────────────────────────────── -->
  <div class="section-label">
    📋 focus board   <!-- ← EDIT THIS: change emoji/label if u want -->
    <span class="count-badge" id="active-badge">0</span>
  </div>

  <div class="scroll-wrap">
    <div class="scroll-inner" id="scroll-inner">
      <ul id="task-list">
        <li class="empty-state">
          <span class="e-icon">📝</span>
          add a task in chat to get started  <!-- ← EDIT THIS: empty state message -->
        </li>
      </ul>
    </div>
  </div>

  <!-- ─── WHOS COWORKING SHELF ────────────────────────────────────────
    shows who's been coworking this session.  the label is editable
  ──────────────────────────────────────────────────────── -->
  <div class="shelf">
    <div class="shelf-label" id="shelf-label">👥 this session</div>  <!-- ← EDIT THIS: or change in settings -->
    <div class="shelf-tags" id="shelf-tags"></div>
  </div>

</div>

<!-- spotlight popup — spawned by JS, don't need to touch this -->
<div id="ct-overlay"></div>

<!-- confetti layer -->
<div id="cel"></div>

<!-- ─── SETTINGS PANEL ──────────────────────────────────────
  this opens when u click the settings dot in OBS Interact.
  don't move the IDs on inputs — JS reads them by ID.
──────────────────────────────────────────────────────── -->
<div id="settings-backdrop" onclick="closeSettings()"></div>
<div id="settings-panel">

  <div class="sp-header">
    <span class="sp-title">widget settings</span>
    <div class="sp-close" onclick="closeSettings()">✕</div>
  </div>

  <!-- background color + hex -->
  <div class="sp-section">
    <span class="sp-label">background color</span>
    <div class="sp-row">
      <input type="color" id="bg-picker" value="#161618" oninput="onPickerChange(this.value)">
      <input type="text"  id="hex-display" value="#161618" maxlength="7"
             oninput="onHexType(this.value)" onblur="onHexCommit(this.value)">
    </div>
    <!-- quick color presets — add/remove these as u like -->
    <div class="sp-swatches">
      <div class="swatch" style="background:#161618" title="near black"       onclick="setPreset('#161618', null)"></div>
      <div class="swatch" style="background:#1a1812" title="espresso"         onclick="setPreset('#1a1812', null)"></div>
      <div class="swatch" style="background:#26221a" title="dark roast"       onclick="setPreset('#26221a', null)"></div>
      <div class="swatch" style="background:#1e1e21" title="dark blue-grey"   onclick="setPreset('#1e1e21', null)"></div>
      <div class="swatch" style="background:#1a1a2e" title="midnight"         onclick="setPreset('#1a1a2e', null)"></div>
      <div class="swatch" style="background:#1f2219" title="deep forest"      onclick="setPreset('#1f2219', null)"></div>
      <div class="swatch" style="background:#2a1f1e" title="deep rose-black"  onclick="setPreset('#2a1f1e', null)"></div>
      <div class="swatch" style="background:#111111" title="full black"       onclick="setPreset('#111111', null)"></div>
    </div>
  </div>

  <!-- opacity slider -->
  <div class="sp-section">
    <span class="sp-label">background opacity</span>
    <div class="sp-row">
      <input type="range" id="opacity-slider" min="0" max="100" value="94"
             oninput="applyOpacity(this.value)">
      <div class="sp-val" id="opacity-val">94%</div>
    </div>
  </div>

</div>


<script>

/* ═══════════════════════════════════════════════════════
   SETTINGS
   change CHANNEL to your twitch username (all lowercase).
   the CMD_ variables are the actual chat commands —
   if u want to rename one, change it here AND in the hints HTML above.
   ═══════════════════════════════════════════════════════ */

var CHANNEL = "teamnopants";   // ← PUT YOUR CHANNEL NAME HERE (lowercase)

// chat commands — rename any of these if u want
// just make sure to also update the hint text in the HTML above
var CMD_TASK      = "!task";
var CMD_DONE      = "!done";
var CMD_DONEALL   = "!doneall";
var CMD_REMOVE    = "!remove";
var CMD_CURRENT   = "!currenttask";
var CMD_MYTASKS   = "!mytasks";
var CMD_CLEARDONE = "!cleardone";   // mod/broadcaster only — clears completed tasks
var CMD_CLEAR     = "!cleartasks";  // mod/broadcaster only — clears everything

/* ═══════════════════════════════════════════════════════
   DOM REFS DONT't rename these
   ═══════════════════════════════════════════════════════ */

var taskList    = document.getElementById("task-list");
var scrollEl    = document.getElementById("scroll-inner");
var cel         = document.getElementById("cel");
var dot         = document.getElementById("dot");
var sessionPill = document.getElementById("session-pill");
var activeBadge = document.getElementById("active-badge");
var shelfTags   = document.getElementById("shelf-tags");
var ctOverlay   = document.getElementById("ct-overlay");

var userGroups    = {};
var doneTotal     = 0;
var roster        = {};
var ctTimer       = null;
var userScrolling = false;
var autoTimer     = null;

/* ═══════════════════════════════════════════════════════
   SETTINGS PANEL
   handles the dot + panel open/close and all the inputs.
   ═══════════════════════════════════════════════════════ */

var curHex = "#161618";
var curOp  = 94;

function openSettings() {
  document.getElementById("settings-panel").classList.add("open");
  document.getElementById("settings-backdrop").classList.add("open");
  document.getElementById("settings-dot").classList.add("active");
}
function closeSettings() {
  document.getElementById("settings-panel").classList.remove("open");
  document.getElementById("settings-backdrop").classList.remove("open");
  document.getElementById("settings-dot").classList.remove("active");
}

function hexToRgb(h) {
  var c = h.replace("#","");
  if (c.length !== 6) return null;
  return {
    r: parseInt(c.slice(0,2), 16),
    g: parseInt(c.slice(2,4), 16),
    b: parseInt(c.slice(4,6), 16)
  };
}

function applyBg() {
  var rgb = hexToRgb(curHex);
  if (!rgb) return;
  document.querySelector(".panel").style.background =
    "rgba(" + rgb.r + "," + rgb.g + "," + rgb.b + "," + (curOp / 100).toFixed(2) + ")";
}

function onPickerChange(hex) {
  curHex = hex;
  document.getElementById("hex-display").value = hex;
  applyBg();
}

function onHexType(val) {
  var v = val.startsWith("#") ? val : "#" + val;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    curHex = v;
    document.getElementById("bg-picker").value = v;
    applyBg();
  }
}

function onHexCommit(val) {
  var v = val.trim();
  if (!v.startsWith("#")) v = "#" + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    curHex = v;
    document.getElementById("bg-picker").value = v;
    document.getElementById("hex-display").value = v;
    applyBg();
  } else {
    document.getElementById("hex-display").value = curHex;
  }
}

function applyOpacity(val) {
  curOp = parseInt(val);
  document.getElementById("opacity-val").textContent = curOp + "%";
  applyBg();
}

function setPreset(hex, op) {
  curHex = hex;
  if (op !== null) curOp = op;
  document.getElementById("bg-picker").value = hex;
  document.getElementById("hex-display").value = hex;
  if (op !== null) {
    document.getElementById("opacity-slider").value = op;
    document.getElementById("opacity-val").textContent = op + "%";
  }
  applyBg();
}

applyBg();

/* ═══════════════════════════════════════════════════════
   CLOCK
   change the timeZone string if u're not ET.
   full list of valid zones:
   https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
   ═══════════════════════════════════════════════════════ */

function tickClock() {
  var now = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',   // ← CHANGE THIS for your timezone
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  }).format(new Date());
  var parts = now.split(' ');
  document.getElementById('clock').textContent = parts[0] + ' ' + parts[1].toLowerCase() + ' et';
}
tickClock();
setInterval(tickClock, 15000);

/* ═══════════════════════════════════════════════════════
   TWITCH CHAT CONNECTION - don't touch this unless something's broken.
   ═══════════════════════════════════════════════════════ */

var ws;
var retries = 0;
var retryTimer;

function connect() {
  clearTimeout(retryTimer);
  dot.className = "dot connecting";
  ws = new WebSocket("wss://irc-ws.chat.twitch.tv");

  ws.onopen = function() {
    var n = 10000 + Math.floor(Math.random() * 89999);
    ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    ws.send("PASS oauth:justinfan" + n);
    ws.send("NICK justinfan" + n);
    ws.send("JOIN #" + CHANNEL);
  };

  ws.onmessage = function(e) {
    var raw = e.data.trim();

    if (raw.startsWith("PING")) { ws.send("PONG " + raw.slice(5)); return; }
    if (raw.includes("366") || raw.includes("JOIN #" + CHANNEL)) {
      dot.className = "dot connected";
      retries = 0;
    }

    var tagChunk = raw.match(/^@([^ ]+) /);
    var msgParts = raw.match(/(?:^@[^ ]+ )?:(\w+)!\w+@\S+ PRIVMSG #\w+ :(.+)$/);
    if (!msgParts) return;

    var user = msgParts[1].toLowerCase();
    var msg  = msgParts[2].trim();
    var lo   = msg.toLowerCase();

    var isMod = false, isBroad = false, isVip = false, isSub = false;
    if (tagChunk) {
      var t = tagChunk[1];
      isMod   = /(?:^|;)mod=1(?:;|$)/.test(t);
      isBroad = /badges=[^;]*broadcaster\/1/.test(t);
      isVip   = /badges=[^;]*vip\/1/.test(t);
      isSub   = /(?:^|;)subscriber=1(?:;|$)/.test(t);
    }
    var isPriv = isMod || isBroad || (user === CHANNEL);
    var meta   = { isMod, isBroad, isVip, isSub };

    /* ═════════════════════════════════════════════════════
       COMMAND ROUTING
       this is where chat messages get matched to commands.

       to add a new command:
       1. add  var CMD_WHATEVER = "!yourcommand";  at the top
       2. add it to the hints HTML
       3. add an  else if  block here like:
          else if (lo === CMD_WHATEVER) { yourFunction(user); }

       the  isPriv  check means only mods + broadcaster can use it.
    ═════════════════════════════════════════════════════ */

    if (lo.startsWith(CMD_TASK + " ")) {
      // supports semicolons: !task email newsletter; review slides; coffee break
      var text = msg.slice(CMD_TASK.length + 1);
      text.split(";").map(s => s.trim()).filter(Boolean).forEach(t => addTask(user, t, meta));
    }
    else if (lo === CMD_DONEALL)              { doneAll(user); }
    else if (lo === CMD_DONE)                 { doneTask(user, null); }
    else if (lo.startsWith(CMD_DONE + " "))   { doneTask(user, parseInt(msg.split(" ")[1])); }
    else if (lo.startsWith(CMD_REMOVE + " ")) { removeTask(user, parseInt(msg.split(" ")[1])); }
    else if (lo === CMD_CURRENT)              { showCurrent(user); }
    else if (lo === CMD_MYTASKS)              { showMyTasks(user); }
    else if (lo === CMD_CLEARDONE && isPriv)  { clearDone(); }
    else if (lo === CMD_CLEAR && isPriv) {
      var p = msg.split(" ");
      p[1] && p[1].startsWith("@") ? clearUser(p[1].slice(1).toLowerCase()) : clearAll();
    }

    // ← ADD NEW COMMANDS ABOVE THIS LINE

  };

  ws.onerror = function() {};
  ws.onclose = function() {
    dot.className = "dot error";
    retries++;
    retryTimer = setTimeout(connect, Math.min(4000 * retries, 30000));
  };
}

connect();

/* ═══════════════════════════════════════════════════════
   PRONOUNS - from pronouns.alejo.io — users set this on their
   twitch profile. if they haven't set it nothing shows up.
   ═══════════════════════════════════════════════════════ */

var pronounCache = {};
var PRONOUN_MAP = {
  "aeaer":"ae/aer","eey":"e/ey","faefaer":"fae/faer",
  "heher":"he/her","hehim":"he/him","heshe":"he/she",
  "hethem":"he/them","itits":"it/its","other":"other",
  "sheher":"she/her","shehim":"she/him","shethem":"she/them",
  "theythem":"they/them","vever":"ve/ver","xexem":"xe/xem",
  "ziehir":"zie/hir","any":"any","ask":"ask","avoid":"avoid/name"
};

async function fetchPronouns(user) {
  if (pronounCache[user] !== undefined) return;
  pronounCache[user] = null;
  try {
    var r = await fetch("https://pronouns.alejo.io/api/users/" + user);
    var d = await r.json();
    if (d && d.length && d[0].pronoun_id) {
      pronounCache[user] = PRONOUN_MAP[d[0].pronoun_id] || d[0].pronoun_id;
      var g = userGroups[user];
      if (g && g.pronounEl) {
        g.pronounEl.textContent = pronounCache[user];
        g.pronounEl.style.display = "";
      }
    }
  } catch(e) {
    // api down or user not found — just skip it
  }
}

/* ═══════════════════════════════════════════════════════
   task handling
   ═══════════════════════════════════════════════════════ */

function el(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function showEmpty() {
  if (!taskList.children.length) {
    var li = el("li", "empty-state");
    li.innerHTML = '<span class="e-icon">📝</span>add a task in chat to get started';
    taskList.appendChild(li);
  }
}
function clearEmpty() {
  var empty = taskList.querySelector(".empty-state");
  if (empty) empty.remove();
}
function updateCounts() {
  var total = Object.values(userGroups).reduce((s, g) => s + g.tasks.filter(t => !t.removed).length, 0);
  activeBadge.textContent = total;
  sessionPill.textContent = doneTotal + " done";
}
function updateHeader(user) {
  var g = userGroups[user];
  if (!g) return;
  var vis  = g.tasks.filter(t => !t.removed);
  var done = vis.filter(t => t.done).length;
  g.countEl.textContent = vis.length ? (done + "/" + vis.length + " done") : "";
  g.groupEl.classList.toggle("all-done", vis.length > 0 && vis.every(t => t.done));
}
function renumber(user) {
  var g = userGroups[user];
  if (!g) return;
  var n = 1;
  g.tasks.filter(t => !t.removed).forEach(t => { t.numEl.textContent = "#" + n; t.idx = n; n++; });
  updateHeader(user);
}

function addToRoster(user) {
  if (roster[user]) return;
  var tag = el("div","stag"); var nm = document.createElement("span"); nm.textContent = user;
  var ct = el("span","done-ct"); tag.append(nm,ct); shelfTags.appendChild(tag);
  roster[user] = { tag, countEl: ct, done: 0 };
}
function rosterDone(user) {
  addToRoster(user);
  roster[user].done++;
  roster[user].countEl.textContent = " " + roster[user].done + "✓";
}

function ensureGroup(user, meta) {
  if (userGroups[user]) return;
  clearEmpty();
  var groupEl = el("li","user-group"); var header = el("div","group-header");
  var uname = el("span","uname"); uname.textContent = user; header.appendChild(uname);
  if (meta) {
    var badges = [];
    if (meta.isBroad) badges.push({icon:"👑",label:"broadcaster"});
    if (meta.isMod)   badges.push({icon:"⚔️",label:"mod"});
    if (meta.isVip)   badges.push({icon:"💎",label:"vip"});
    if (meta.isSub)   badges.push({icon:"⭐",label:"sub"});
    if (badges.length) {
      var bWrap = el("span","user-badges");
      badges.forEach(b => { var s = el("span","ubadge"); s.textContent = b.icon; s.title = b.label; bWrap.appendChild(s); });
      header.appendChild(bWrap);
    }
  }
  var pronounEl = el("span","pronouns-tag"); pronounEl.style.display = "none"; header.appendChild(pronounEl);
  var countEl = el("span","group-count"); header.appendChild(countEl);
  var tasksEl = el("ul","group-tasks"); tasksEl.style.cssText = "list-style:none;display:flex;flex-direction:column;gap:0";
  groupEl.append(header, tasksEl); taskList.appendChild(groupEl);
  userGroups[user] = { groupEl, tasksEl, countEl, pronounEl, tasks: [] };
  fetchPronouns(user);
}

function addTask(user, text, meta) {
  if (!text) return;
  addToRoster(user); ensureGroup(user, meta);
  var g = userGroups[user];
  var n = g.tasks.filter(t => !t.removed).length + 1;
  var li = el("li","task-item new-item");
  var numEl = el("span","task-num"); numEl.textContent = "#" + n;
  var txtEl = el("span","task-text"); txtEl.textContent = text;
  li.append(numEl, txtEl); g.tasksEl.appendChild(li);
  var entry = { text, item: li, numEl, txtEl, done: false, removed: false, idx: n };
  g.tasks.push(entry);
  updateHeader(user); updateCounts(); saveState(); scheduleScroll();
  requestAnimationFrame(() => scrollEl.scrollTo({ top: scrollEl.scrollHeight, behavior: "smooth" }));
}

function markOneDone(user, entry) {
  if (entry.done) return;
  entry.done = true; entry.item.classList.add("done-item");
  var chk = el("span","done-check"); chk.textContent = "✓"; entry.item.appendChild(chk);
  updateHeader(user); saveState();
}
function doneTask(user, num) {
  var g = userGroups[user]; if (!g) return;
  var active = g.tasks.filter(t => !t.removed && !t.done); if (!active.length) return;
  var target = (num != null && !isNaN(num)) ? (active.find(t => t.idx === num) || active[0]) : active[0];
  if (!target) return;
  doneTotal++; rosterDone(user); markOneDone(user, target); celebrate(user); updateCounts();
}
function doneAll(user) {
  var g = userGroups[user]; if (!g) return;
  var active = g.tasks.filter(t => !t.removed && !t.done); if (!active.length) return;
  active.forEach(t => { doneTotal++; rosterDone(user); markOneDone(user, t); });
  celebrate(user); updateCounts();
}
function removeTask(user, num) {
  var g = userGroups[user]; if (!g || isNaN(num)) return;
  var target = g.tasks.find(t => !t.removed && t.idx === num);
  if (target) physRemove(target, user);
}
function physRemove(entry, user) {
  if (entry.removed) return;
  entry.removed = true; entry.item.classList.add("leaving");
  setTimeout(() => {
    entry.item.remove();
    if (user && userGroups[user]) {
      var alive = userGroups[user].tasks.filter(t => !t.removed);
      if (!alive.length) { userGroups[user].groupEl.remove(); delete userGroups[user]; }
      else renumber(user);
    }
    showEmpty(); updateCounts(); saveState();
  }, 440);
}
function clearDone() {
  Object.keys(userGroups).forEach(user => {
    userGroups[user].tasks.filter(t => t.done && !t.removed).forEach((t,i) => setTimeout(() => physRemove(t,user), i*45));
  });
}
function clearUser(user) {
  if (!userGroups[user]) return;
  userGroups[user].tasks.filter(t => !t.removed).forEach((t,i) => setTimeout(() => physRemove(t,user), i*50));
}
function clearAll() {
  clearInterval(autoTimer);
  Object.keys(userGroups).forEach(user => userGroups[user].tasks.filter(t => !t.removed).forEach(t => physRemove(t, null)));
  setTimeout(() => {
    Object.keys(userGroups).forEach(k => { if (userGroups[k]) userGroups[k].groupEl.remove(); delete userGroups[k]; });
    shelfTags.innerHTML = ""; Object.keys(roster).forEach(k => delete roster[k]);
    doneTotal = 0; taskList.innerHTML = ""; showEmpty(); updateCounts();
    localStorage.removeItem(STORE_KEY);
  }, 500);
}

/* ═══════════════════════════════════════════════════════
  higlight task (!currenttask / !mytasks)
   ═══════════════════════════════════════════════════════ */

function showCurrent(user) {
  var g = userGroups[user]; if (!g) return;
  var active = g.tasks.filter(t => !t.removed && !t.done); if (!active.length) return;
  spawnSpotlight(user, "current task", [active[0].txtEl.textContent]);
}
function showMyTasks(user) {
  var g = userGroups[user]; if (!g) return;
  var active = g.tasks.filter(t => !t.removed && !t.done); if (!active.length) return;
  spawnSpotlight(user, "task list", active.map(t => t.txtEl.textContent));
}
function spawnSpotlight(user, label, tasks) {
  clearTimeout(ctTimer);
  var old = ctOverlay.querySelector(".ct-card"); if (old) old.remove();
  var card = el("div","ct-card");
  var who = el("div","ct-who"); who.textContent = user + "'s " + label;
  var lbl = el("div","ct-label"); lbl.textContent = "working on";
  card.append(who, lbl);
  if (tasks.length === 1) {
    var taskEl = el("div","ct-task"); taskEl.textContent = tasks[0]; card.appendChild(taskEl);
  } else {
    var ul = el("ul","ct-tasks");
    tasks.forEach((t,i) => {
      var li = document.createElement("li");
      var num = el("span","ct-n"); num.textContent = "#"+(i+1);
      var tx = document.createElement("span"); tx.textContent = t;
      li.append(num, tx); ul.appendChild(li);
    });
    card.appendChild(ul);
  }
  var icon = el("div","ct-icon"); icon.textContent = "✨"; card.appendChild(icon);
  ctOverlay.appendChild(card);
  ctTimer = setTimeout(() => {
    card.classList.add("leaving");
    setTimeout(() => card.remove(), 450);
  }, 6000);   // ← change this number (ms) to make it stay longer/shorter
}

/* ═══════════════════════════════════════════════════════
   AUTOSCROLL
   kicks in when there are more than 5 tasks total.
   speed scales up as more tasks are added. auto pauses for 9 seconds.
   ═══════════════════════════════════════════════════════ */

function scheduleScroll() {
  clearInterval(autoTimer);
  var total = Object.values(userGroups).reduce((s,g) => s + g.tasks.filter(t => !t.removed).length, 0);
  if (total <= 5) return;
  var speed = Math.min(0.5 + (total - 5) * 0.1, 2.8);
  var dir = 1;
  autoTimer = setInterval(() => {
    if (userScrolling) return;
    var max = scrollEl.scrollHeight - scrollEl.clientHeight;
    if (max <= 0) return;
    scrollEl.scrollTop += dir * speed;
    if (scrollEl.scrollTop >= max - 1) dir = -1;
    else if (scrollEl.scrollTop <= 0)  dir = 1;
  }, 50);
}
scrollEl.addEventListener("wheel", () => {
  userScrolling = true;
  clearTimeout(window._pauseScroll);
  window._pauseScroll = setTimeout(() => { userScrolling = false; }, 9000);
}, { passive: true });

/* ═══════════════════════════════════════════════════════
  celebration - done
   ═══════════════════════════════════════════════════════ */

var CONFETTI_COLORS = ["#9db4cc","#b8ccb0","#c9a96e","#d4bdb0","#ffffff","#e8e2d8","#aac4a8"];

// ← EDIT THESE: the little toast messages when someone finishes a task
var TOASTS = [
  u => "✓ nice work, " + u + "!",
  u => "✓ you did that, " + u + "!",
  () => "✓ task complete ✨",
  u => "✓ let's go, " + u + "!",
  () => "✓ one down!",
  u => "✓ great job " + u + "! 💫"
];

var BLOOMS = ["✨","🌟","⭐","💫","🎊","🎉","💥","🌸","🌼","🍃","💚","🌺"];

function celebrate(user) {
  cel.innerHTML = "";
  var toast = el("div","toast");
  toast.textContent = TOASTS[Math.floor(Math.random() * TOASTS.length)](user);
  cel.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
  for (var i = 0; i < 75; i++) {
    var p = el("div","cp"); var sz = 7 + Math.random()*13;
    p.style.cssText = "left:"+(5+Math.random()*790)+"px;top:"+(20+Math.random()*680)+"px;" +
      "width:"+sz+"px;height:"+(sz*(Math.random()<.3?.3:1))+"px;" +
      "background:"+CONFETTI_COLORS[i%CONFETTI_COLORS.length]+";border-radius:3px;" +
      "--tx:"+((Math.random()-.5)*190)+"px;--ty:"+(-(45+Math.random()*260))+"px;" +
      "--r:"+(Math.random()*680)+"deg;--d:"+(1.0+Math.random()*1.5)+"s;";
    cel.appendChild(p); setTimeout(() => p.remove(), 2900);
  }
  for (var j = 0; j < 10; j++) {
    var b = el("div","bl"); b.textContent = BLOOMS[j%BLOOMS.length];
    b.style.cssText = "left:"+(50+j*70)+"px;top:"+(60+(j%4)*90)+"px;" +
      "animation-delay:"+(j*.065)+"s;font-size:"+(26+Math.random()*14)+"px;";
    cel.appendChild(b); setTimeout(() => b.remove(), 2200);
  }
}

/* ═══════════════════════════════════════════════════════
local save
    ═══════════════════════════════════════════════════════ */

var STORE_KEY = "coworkingbase";

function saveState() {
  try {
    var data = Object.keys(userGroups).map(user => ({
      user,
      tasks: userGroups[user].tasks.filter(t => !t.removed).map(t => ({ text: t.text, done: t.done }))
    })).filter(u => u.tasks.length);
    localStorage.setItem(STORE_KEY, JSON.stringify({ tasks: data, doneTotal }));
  } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (saved.doneTotal) doneTotal = saved.doneTotal;
    saved.tasks.forEach(({ user, tasks }) => {
      tasks.forEach(({ text, done }) => {
        addTask(user, text, null);
        if (done) {
          var g = userGroups[user];
          if (g) {
            var entry = g.tasks[g.tasks.length - 1];
            if (entry && !entry.done) {
              entry.done = true; entry.item.classList.add("done-item");
              var chk = el("span","done-check"); chk.textContent = "✓"; entry.item.appendChild(chk);
            }
          }
        }
      });
      if (userGroups[user]) updateHeader(user);
    });
    updateCounts();
  } catch(e) {}
}

updateCounts();
showEmpty();
loadState();

</script>
</body>
</html>
